<!DOCTYPE html>
<html>
<head>
  <title>Sentiment Journal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f8fa;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 480px;
      margin: 60px auto;
      background: white;
      padding: 28px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 22px;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }

    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .link {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
    }

    .emotions {
      background: #f1f5f9;
      padding: 14px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 14px;
    }

    .emotion {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .error {
      color: #dc2626;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
