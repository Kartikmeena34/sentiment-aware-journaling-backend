{% extends "ui/base.html" %}
{% block content %}

<h1>Your Journal</h1>

<form method="post">
  {% csrf_token %}
  <textarea name="text" rows="4" placeholder="Write what you're feeling..." required></textarea>
  <button type="submit">Analyze Emotion</button>
</form>

{% if emotions %}
<div class="emotions">
  <h2>Detected Emotions</h2>
  {% for key, value in emotions.items %}
    <div class="emotion">
      <span>{{ key }}</span>
      <span>{{ value|floatformat:2 }}</span>
    </div>
  {% endfor %}
</div>
{% endif %}

{% endblock %}
